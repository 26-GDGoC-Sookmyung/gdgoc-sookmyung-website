name: 일반 작업
description: 설정, 문서, 리팩터링 등의 작업을 등록합니다.
title: "[Task] "
labels:
  - task
body:
  - type: textarea
    id: task-description
    attributes:
      label: 작업 설명
      description: 진행할 작업을 간단히 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: task-purpose
    attributes:
      label: 작업 목적
      description: 이 작업이 필요한 이유를 작성해주세요.
    validations:
      required: true
  - type: textarea
    id: task-details
    attributes:
      label: 세부 작업
      description: 필요한 세부 작업을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] 설정 파일 수정
        - [ ] 문서 업데이트
        - [ ] 검증 명령 실행
    validations:
      required: true
  - type: checkboxes
    id: task-definition-of-done
    attributes:
      label: 완료 조건
      description: 작업 완료 전 확인해야 할 항목입니다.
      options:
        - label: 작업 범위에 맞게 변경했다.
        - label: 관련 파일을 검토했다.
        - label: ESLint 오류가 없다.
        - label: 프로덕션 빌드가 성공한다.
        - label: 필요한 문서를 수정했다.
  - type: input
    id: task-related-issues
    attributes:
      label: 관련 이슈
      description: 관련된 이슈 번호가 있다면 작성해주세요.
      placeholder: 예) #10
    validations:
      required: false
  - type: textarea
    id: task-notes
    attributes:
      label: 추가 사항
      description: 그 외 공유해야 할 내용을 작성해주세요.
    validations:
      required: false
