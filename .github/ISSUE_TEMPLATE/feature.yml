name: 기능 개발
description: 새로운 기능 개발을 위한 이슈입니다.
title: '[Feature] '
labels:
  - feature

body:
  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 구현할 기능과 목적을 작성해주세요.
      placeholder: |
        예)
        - 공통 Header를 구현합니다.
        - 로그인 상태에 따라 우측 영역을 다르게 표시합니다.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 내용
      description: 필요한 작업을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] Header UI 구현
        - [ ] 메뉴 라우팅 연결
        - [ ] 로그인 상태 UI 처리
        - [ ] 반응형 스타일 적용
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 디자인, 문서, 링크를 첨부해주세요.
      placeholder: |
        - Figma:
        - 관련 이슈:
        - API 문서:
    validations:
      required: false
