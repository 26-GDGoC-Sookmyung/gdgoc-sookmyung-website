name: 버그 신고
description: 발생한 오류나 비정상 동작을 신고합니다.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: bug-summary
    attributes:
      label: 발생한 문제
      description: 어떤 문제가 발생했는지 간단히 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: bug-steps
    attributes:
      label: 재현 방법
      description: 문제를 재현할 수 있는 순서를 작성해주세요.
      placeholder: |
        1. 페이지에 접속한다.
        2. 특정 버튼을 클릭한다.
        3. 오류가 발생한다.
    validations:
      required: true
  - type: textarea
    id: bug-expected
    attributes:
      label: 기대한 동작
      description: 정상적으로 기대한 동작을 작성해주세요.
    validations:
      required: true
  - type: textarea
    id: bug-actual
    attributes:
      label: 실제 동작
      description: 실제로 발생한 동작을 작성해주세요.
    validations:
      required: true
  - type: textarea
    id: bug-environment
    attributes:
      label: 발생 환경
      description: 문제 발생 환경을 가능한 자세히 작성해주세요.
      value: |
        - OS:
        - 브라우저:
        - 브라우저 버전:
        - 디바이스:
        - 실행 환경:
    validations:
      required: true
  - type: textarea
    id: bug-related-page
    attributes:
      label: 관련 화면
      description: 문제가 발생한 페이지나 화면 이름을 작성해주세요.
      placeholder: 예) Home, Header, Footer
    validations:
      required: false
  - type: textarea
    id: bug-logs-screenshots
    attributes:
      label: 로그 또는 스크린샷
      description: 콘솔 로그, 에러 메시지, 스크린샷이 있다면 첨부해주세요.
      render: shell
    validations:
      required: false
  - type: textarea
    id: bug-notes
    attributes:
      label: 추가 사항
      description: 그 외 공유해야 할 내용을 작성해주세요.
    validations:
      required: false
